manifest_version: 1
name: chaos-cars-admin
description: "Operator-deployed admin agent for the cars vertical. Reads dispute submissions, publishes admin decisions, manages NIP-58 badge issuance. NOT for end users."
version: 0.1.0
entry_point: chaos_cars_admin:register

dependencies:
  # Placeholder — the admin engine package is being authored in
  # parallel. Pin once it ships its 0.1 tag.
  - chaos-admin-engine>=0.1

includes:
  skill: skills/admin-cars/SKILL.md              # being authored by the parallel agent
  pack_contract: cars-pack@1
  pack_schema: ../../verticals/cars-pack/tag_schema.md
  capability_mcps:
    - reputation-mcp@1                           # admin reads attestations and publishes decisions

required_env:
  - CHAOS_OPERATOR_KEY                     # path to operator's secp256k1 key (mode 0600)
  - CHAOS_ADMIN_RELAYS                     # write set: operator-controlled relays

# Default: same closed toolset as end-user plugins. The admin agent
# DOES need outbound MCP for relay writes, but `mcp` is not a Hermes
# toolset-class — it's the wire — so it's not listed here.
#
# Admin scope rules:
#   - admin-agent only writes (publishes) to its own relay set + reads dispute submissions.
#   - admin-agent does NOT inquire to seller/buyer MCP servers (no direct peer-MCP calls).
#   - admin-agent does NOT custody DM content; reads only structured kinds
#     30410/30411/30412 (peer attestations) and publishes 30430/30431 (decisions/appeals).
#     Encrypted dispute submissions via `submit_dispute` are decrypted in memory only.
forbidden_toolsets: [terminal, delegation, file, web]
