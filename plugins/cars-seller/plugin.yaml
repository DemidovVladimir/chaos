name: cars-seller
version: 1.0.0
description: "Sell cars on the chaos Nostr-based marketplace. Bundles cars-pack@1 contract with the universal seller engine. Publishes NIP-99 listings and exposes a per-seller FastMCP server for photos and inspection PDFs."
author: chaos
kind: standalone

# Hermes reads these and surfaces them in `hermes plugins list`.
# The user supplies them via `~/.chaos/.env` (mode 0600).
requires_env:
  - CHAOS_RELAYS
  - CHAOS_MCP_URL

# Slash commands and CLI subcommands this plugin registers. Hermes
# itself doesn't enforce this list — it's documentation. The actual
# wiring lives in __init__.py::register.
provides_tools: []
provides_hooks: []

# --- documentation-only fields (Hermes ignores these) -----------------
# Kept here so chaos lint / docs can still see the contract.
chaos:
  pack_contract: cars-pack@1
  pack_schema: ../../verticals/cars-pack/tag_schema.md
  skill_path: verticals/cars-pack/skills/seller-cars/SKILL.md
  capability_mcps: []
  forbidden_toolsets: [terminal, delegation, file, web]
  role: seller
