version: "3.9"

services:
  strfry:
    image: dockurr/strfry:latest    # community-built; pin to a digest in prod
    container_name: strfry
    restart: unless-stopped
    expose:
      - "7777"
    volumes:
      - ./strfry-config.toml:/etc/strfry.conf:ro
      - ./writePolicy.js:/app/strfry-db/writePolicy.js:ro
      - strfry-data:/app/strfry-db
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7777/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - relay-net

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - strfry
    networks:
      - relay-net

  prom-exporter:
    image: prom/node-exporter:latest
    container_name: prom-exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - relay-net

volumes:
  strfry-data:
  caddy-data:
  caddy-config:

networks:
  relay-net:
    driver: bridge
