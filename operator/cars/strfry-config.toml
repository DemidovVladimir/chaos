# strfry configuration for the chaos Mode A relay.
# Format reference: https://github.com/hoytech/strfry/blob/master/strfry.conf

db = "/app/strfry-db/"

[relay]
bind = "0.0.0.0"
port = 7777
nofiles = 1000000
realIpHeader = "X-Forwarded-For"

info {
    name = "chaos cars relay"
    description = "Curated Nostr relay for the chaos cars marketplace. NIP-99 listings, NIP-17 sealed DMs. Moderated. PoW required."
    pubkey = "<your-operator-pubkey-hex>"
    contact = "abuse@<your-domain>"
    supported_nips = [1, 9, 11, 12, 13, 15, 16, 17, 33, 40, 42, 50, 58, 99]
    software = "https://github.com/hoytech/strfry"
    version = "0.9"
}

# Connection limits
maxWebsocketPayloadSize = 131072      # 128 KB
autoPingSeconds = 55
enableTcpKeepalive = true
queryTimesliceBudgetMicroseconds = 10000
maxFiltersPerSubscription = 100

[events]
ephemeralEventsLifetimeSeconds = 300
maxEventSize = 16384                  # 16 KB
rejectEventsNewerThanSeconds = 900    # 15 min — clock skew tolerance
rejectEventsOlderThanSeconds = 31536000   # 1 year
rejectEphemeralEventsOlderThanSeconds = 60

# NIP-13 PoW gate. 20 bits ≈ 150 ms CPU on a normal laptop.
# Encrypted DMs (NIP-17 gift wraps, kind 1059) are exempt — see writePolicy.
minPowDifficulty = 20

[ingester]
numThreads = 3
maxBatchSize = 100
maxLatencyMicroseconds = 10000

# strfry calls writePolicy.js for every incoming event. The script:
#   1. Allowlists kinds we actually want
#   2. Skips PoW check on encrypted DM kinds (NIP-17)
#   3. Loads pubkey allow/blocklists from external files
#   4. Applies per-pubkey rate limits
[plugins]
writePolicy = "/app/strfry-db/writePolicy.js"
